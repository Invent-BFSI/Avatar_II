<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aria - Investment Advisor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Avatar Section -->
        <div id="avatar-container">
            <div id="avatar-view"></div>
            <div class="controls">
                <button id="start-stop-btn">Start/Stop Session</button>
                <button id="clear-log-btn">Clear Log</button>
                <div id="status">Status: Waiting</div>
            </div>
        </div>
        
        <!-- Chat / Transcript Section -->
        <div id="chat-container">
            <h2>Conversation Transcript</h2>
            <div id="chat-log"></div>
        </div>
    </div>

    <!-- Import Map for Three.js and TalkingHead -->
    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/",
        "talkinghead": "https://cdn.jsdelivr.net/gh/met4citizen/TalkingHead@main/modules/talkinghead.mjs"
      }
    }
    </script>
    <script type="module" src="app.js"></script>
</body>
</html>
